<script is:build>
	import site from '@content/site'
	const dismiss = el => setTimeout(() => el.replaceChildren(), 3000)
</script>

<!-- Alpine x-data & @htmx:after-swap example -->
<section x-data="{ input: '', dismiss: ${dismiss} }">
	<p>Test the server:</p>
	<form
		data-testid="home-form"
		hx-post="/api/submit"
		hx-on::after-request="if (event.detail.successful) this.reset()"
		hx-target="[hx-toast]"
		hx-swap="innerHTML">
		<input
			x-model="input"
			data-testid="home-message-input"
			type="text"
			name="message"
			placeholder="Enter a message" />
		<button type="submit" :disabled="!input.length">{ site.home.cta }</button>
	</form>

	<!-- Needs to be hoisted to bottom of body if not inline -->
	<!-- Or should all nested scripts default to inline? -->
	<script is:inline src="/scripts/static.js"></script>

	<span class="toast" data-testid="home-toast" hx-toast @htmx:after-swap="dismiss($el)"></span>

	<style>
		@scope {
			:scope {
				margin-block-start: 10vmin;
			}

			p {
				font-size: smaller;
			}

			form {
				margin-bottom: var(--vertical-spacing);
			}
		}
	</style>
</section>
