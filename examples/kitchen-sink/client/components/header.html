<script is:build>
	import type { HeaderProps } from '@client/types/props.ts'
	import logo from '@components/logo.html'

	const props = Aero.props as HeaderProps
	const isHomepage = Aero.page.routePath === '/'
	const isCounterDemo = Aero.page.routePath === '/demos/counter'
</script>

<script is:state>
	const { count = Aero.bindable() } = Aero.props
</script>

<header>
	<logo-component if="{ isHomepage }" class="logo" />
	<h1 else-if="{ props.title }">{ props.title }</h1>

	<div if="{ isCounterDemo }" class="card v-stack items-center">
		<h4>Reactive prop binding</h4>
		<div class="h-stack items-center">
			<button on:click="{ count-- }">−</button>
			<code>bind:count="{ count }"</code>
			<button on:click="{ count++ }">+</button>
		</div>
	</div>

	<slot name="subtitle">
		<p class="subtitle secondary">{ props.subtitle }</p>
	</slot>

	<!-- Overrides global styles -->
	<style>
		@scope {
			:scope {
				background: none;
			}

			.logo {
				width: 300px;
				margin-bottom: 1rem;
			}

			.subtitle {
				max-width: 45ch;
				text-wrap: pretty;
				justify-self: center;
			}
		}
	</style>
</header>

<!-- Global styles -->
<style>
	header {
		background: red;
	}
</style>
