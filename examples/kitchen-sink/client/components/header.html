<script is:build>
	import type { HeaderProps } from '@client/types/props'
	import logo from '@components/logo'

	const props = Aero.props as HeaderProps
	const isHomepage = Aero.page.routePath === '/'
	const isCounterDemo = Aero.page.routePath === '/demos/counter'
</script>

<script is:state>
	const { count = Aero.bindable() } = Aero.props
</script>

<header>
	<logo-component if="{ isHomepage }" class="logo" />
	<h1 else-if="{ props.title }">{ props.title }</h1>
	<h2 else>Fallback Title</h2>

	<div if="{ isCounterDemo }" class="binding-demo v-stack items-center">
		<h3>Live prop binding</h3>
		<code>bind:count="{ count }"</code>
		<div class="h-stack items-center">
			<button on:click="{ count-- }">−</button>
			<button on:click="{ count++ }">+</button>
		</div>
	</div>

	<p class="subtitle secondary">{ props.subtitle }</p>

	<!-- Overrides global styles -->
	<style>
		@scope {
			:scope {
				background: none;
			}

			.logo {
				width: 300px;
				margin-bottom: 1rem;
			}

			.subtitle {
				max-width: 45ch;
				text-wrap: pretty;
			}
		}
	</style>
</header>

<!-- Global styles -->
<style>
	header {
		background: red;
	}

	.binding-demo {
		padding: 1rem;
		border-radius: var(--radius-md);
		border: 1px solid --opacity(currentColor, 0.1);
	}
</style>

<script props="{ isHomepage }">
	import { allCaps } from '@scripts/utils/transform'
	console.debug(allCaps('[aero]'), 'isHomepage', isHomepage)
</script>

<script is:inline props="{ isHomepage }">
	console.debug('[aero] isHomepage', isHomepage)
</script>
