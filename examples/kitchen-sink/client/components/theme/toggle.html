<style>
	@layer components {
		[data-theme='system'] .theme-icon.system,
		[data-theme='light'] .theme-icon.light,
		[data-theme='dark'] .theme-icon.dark {
			opacity: initial;
			scale: initial;
			translate: initial;
		}

		@scope (.theme-toggle) {
			:scope {
				display: grid;
				gap: 0;
				padding: 1.5rem;
				color: var(--color-fg);
			}

			svg {
				width: 24px;
				aspect-ratio: 1 / 1;
				fill: none;
				stroke: currentColor;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;

				position: absolute;
				place-self: center;
				opacity: 0;
				scale: 0.5;
				translate: 0 1em;

				transition-property: opacity, scale, translate;
				transition-timing-function: var(--ease-in-out-quadratic);
				transition-duration: var(--duration-medium);
			}
		}
	}
</style>
