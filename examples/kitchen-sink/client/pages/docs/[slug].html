<script is:build>
	import base from '@layouts/base.html'
	import badge from '@components/badge.html'
	import { getCollection, render } from 'aero:content'

	export async function getStaticPaths() {
		const docs = await getCollection('docs')
		return docs.map(doc => ({
			params: { slug: doc.id },
			props: doc,
		}))
	}

	const doc = Aero.props
	const { html } = await render(doc)
</script>

<base-layout title="{ doc.data.title }" description="{ doc.data.subtitle }">
	<span slot="into-nav">← <a href="/docs">All docs</a></span>
	<article class="prose prose-slate prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<badge-component if="{ !doc.data.published }" label="Draft" />
			<h1 class="mb-0">{ doc.data.title }</h1>
			<p class="text-lg">{ doc.data.subtitle }</p>
		</header>
		<hr />
		<section>{ raw(html) }</section>
	</article>
</base-layout>
