<script is:build>
	import base from '@layouts/base.html'
	import badge from '@components/badge.html'
	import { getCollection } from 'aero:content'

	const docs = await getCollection('docs')
	const sortedDocs = docs.sort((a, b) => {
		return b.data.published - a.data.published
	})
</script>

<base-layout title="Docs" description="Learn about Aero">
	<header class="mb-10">
		<h1 class="text-2xl font-bold">Docs</h1>
		<p>Pages loaded from <code>client/content/docs</code></p>
	</header>

	<ul class="grid gap-2 grid-cols-1 md:grid-cols-3" data-testid="docs-list">
		<li for="{ const { id, data } of sortedDocs }">
			<a class="card block" href="/docs/{ id }">
				<header>
					<span class="font-bold">{ data.title }</span>
					<badge-component if="{ !data.published }" label="Draft" />
				</header>
				<p>{ data.subtitle }</p>
			</a>
		</li>
	</ul>
</base-layout>
