<script is:build lang="ts">
	import sub from '@layouts/sub'
	import header from '@components/header'
	import aboutImage from '@images/about.jpg'
	import site from '@content/site'

	const meta = {
		title: 'About Meta Title',
		image: Aero.site.url + aboutImage,
	}

	const props = {
		custom: { title: 'About Page Title' },
		subtitle: site.about.subtitle,
	}

	const AuthState = {
		Initializing: 'Initializing',
		Registering: 'Registering',
		Authenticating: 'Authenticating',
		SignedIn: 'SignedIn',
		SignedOut: 'SignedOut',
	} as const

	type AuthState = (typeof AuthState)[keyof typeof AuthState]

	const auth = { state: AuthState.SignedOut }
</script>

<sub-layout title="{ meta.title }" image="{ meta.image }">
	<img src="{ aboutImage }" class="fullscreen" alt="About" />

	<!-- FIXME:  slot="thru-sub" should be stripped on compile -->
	<div class="h-stack" slot="thru-sub">
		<a href="/register">Register</a>
		<div switch="{ auth.state }">
			<a href="/logout" case="{ AuthState.SignedIn }">Log Out</a>
			<a href="/login" case="{ AuthState.SignedOut }">Log In</a>
			<span default>Default</span>
		</div>
	</div>

	<header-component props />
</sub-layout>
