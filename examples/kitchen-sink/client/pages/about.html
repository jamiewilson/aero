<script is:build>
	import sub from '@layouts/sub'
	import header from '@components/header'
	import aboutImage from '@images/about.jpg'
	import site from '@content/site'

	const props = {
		title: 'About Page Title',
		subtitle: site.about.subtitle,
		requiredProp: true,
	}
</script>

<script is:state>
	import { AuthState } from '@shared/types/auth'
	let authState = AuthState.SignedOut

	let authHref = authState === AuthState.SignedIn ? '/logout' : '/login'
	let authLabel = authState === AuthState.SignedIn ? 'Log Out' : 'Log In'

	function toggleAuth() {
		authState = authState === AuthState.SignedIn ? AuthState.SignedOut : AuthState.SignedIn
	}

	function syncAuthLink(event) {
		event.preventDefault()
		toggleAuth()
		event.currentTarget.href = authHref
	}
</script>

<sub-layout title="About Meta Title" image="{ Aero.site.url + aboutImage }">
	<img src="{ aboutImage }" class="fullscreen" alt="About" />

	<div class="h-stack" slot="thru-sub">
		<code class="secondary">Auth state: { authState }</code>
		<a href="{ authHref }" on:click="{ syncAuthLink(event) }">{ authLabel }</a>
	</div>

	<header-component props />
</sub-layout>

<style>
	img.fullscreen {
		position: fixed;
		inset: 0;
		margin: auto;
		z-index: -1;
		width: 100%;
		height: 100%;
		object-fit: cover;
		filter: grayscale(1);
		opacity: 0.1;
	}
</style>
