<script is:build>
	import base from '@layouts/base'
</script>

<script is:state>
	let email = ''
	let agree = false
	let plan = ''
	let bio = ''

	const isComplete = () => {
		return email.length > 0 && agree && plan.length > 0 && bio.length > 0
	}
</script>

<base-layout title="Form model">
	<form class="v-stack" class:is-valid="{ isComplete() }">
		<div class="v-stack">
			<label for="email">Email</label>
			<input id="email" type="email" placeholder="Enter your email..." value="{ email }" required />
		</div>

		<div class="v-stack">
			<label for="plan-select">Plan (select)</label>
			<select id="plan-select" value="{ plan }">
				<option value="" disabled selected>Select a plan...</option>
				<option value="free">Free</option>
				<option value="pro">Pro</option>
			</select>
		</div>

		<fieldset class="v-stack">
			<label>Plan (radio group)</label>
			<label class="h-stack items-center">
				<input type="radio" name="plan-radio" value="free" checked="{ plan }" />
				<span>Free</span>
			</label>
			<label class="h-stack items-center">
				<input type="radio" name="plan-radio" value="pro" checked="{ plan }" />
				<span>Pro</span>
			</label>
		</fieldset>

		<label class="v-stack">
			<span>Bio</span>
			<textarea placeholder="Add a bio..." value="{ bio }" rows="3"></textarea>
		</label>

		<label class="h-stack items-center">
			<input type="checkbox" checked="{ agree }" />
			<span>Agree to terms</span>
		</label>
	</form>

	<div class="info">
		<div>Email: <code>{ email || 'empty' }</code></div>
		<div>Agreed: <code>{ agree || 'false' }</code></div>
		<div>Plan: <code>{ plan || 'empty' }</code></div>
		<div>Bio: <code>{ bio || 'empty' }</code></div>
		<div>Is valid: <code>{ isComplete() }</code></div>
	</div>
</base-layout>

<style>
	form {
		min-inline-size: 20rem;
	}

	.info {
		position: absolute;
		text-align: start;
		font-size: smaller;
	}

	.is-valid {
		outline: 2px solid lightgreen;
		outline-offset: 2rem;
		corner-shape: squircle;
		border-radius: var(--radius-md);
	}
</style>
