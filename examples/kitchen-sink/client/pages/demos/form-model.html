<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let formModel = {
		email: '',
		agree: false,
		plan: '',
		bio: '',
	}

	const isComplete = () => {
		return (
			formModel.email.length > 0 &&
			formModel.agree &&
			formModel.plan.length > 0 &&
			formModel.bio.length > 0
		)
	}
</script>

<base-layout title="Form model">
	<aside class="info-panel">
		<div>Email: <code>{ formModel.email || 'empty' }</code></div>
		<div>Agreed: <code>{ formModel.agree || 'false' }</code></div>
		<div>Plan: <code>{ formModel.plan || 'empty' }</code></div>
		<div>Bio: <code>{ formModel.bio || 'empty' }</code></div>
		<div>Is valid: <code>{ isComplete() }</code></div>
	</aside>

	<section class="grid h-full place-items-center">
		<form class="grid gap-4 w-full max-w-sm">
			<div class="grid gap-2">
				<label for="email">Email</label>
				<input
					id="email"
					type="email"
					placeholder="Enter your email..."
					value="{ formModel.email }"
					required />
			</div>

			<div class="grid gap-2">
				<label for="plan-select">Plan (select)</label>
				<select id="plan-select" value="{ formModel.plan }">
					<option value="" disabled selected>Select a plan...</option>
					<option value="free">Free</option>
					<option value="pro">Pro</option>
				</select>
			</div>

			<fieldset class="grid gap-1">
				<label>Plan (radio group)</label>
				<label>
					<input type="radio" name="plan-radio" value="free" checked="{ formModel.plan }" />
					<span>Free</span>
				</label>
				<label>
					<input type="radio" name="plan-radio" value="pro" checked="{ formModel.plan }" />
					<span>Pro</span>
				</label>
			</fieldset>

			<label class="grid gap-2">
				<span>Bio</span>
				<textarea placeholder="Add a bio..." value="{ formModel.bio }" rows="3"></textarea>
			</label>

			<label>
				<input type="checkbox" checked="{ formModel.agree }" />
				<span>Agree to terms</span>
			</label>

			<button type="submit" disabled="{ !isComplete() }" class:is-valid="{ isComplete() }">
				Submit
			</button>
		</form>
	</section>
</base-layout>

<style>
	.info-panel {
		position: absolute;
		inset: 0;
		font-size: smaller;
		padding: 2rem;
		pointer-events: none;
	}

	.is-valid {
		outline: 2px solid lightgreen;
	}
</style>
