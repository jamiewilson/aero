<script is:build>
	import base from '@layouts/base'
</script>

<script is:state>
	let email = ''
	let agree = false
	let plan = ''
	let bio = ''

	const isComplete = () => {
		return email.length > 0 && agree && plan.length > 0 && bio.length > 0
	}
</script>

<base-layout title="Form model">
	<form class="v-stack" class:is-valid="{ isComplete() }">
		<p class="secondary">Inferred two-way <code>value</code> / <code>checked</code></p>

		<label class="v-stack">
			<span>Email</span>
			<input type="email" placeholder="Enter your email..." value="{ email }" required />
		</label>

		<label class="v-stack">
			<span>Plan</span>
			<select value="{ plan }">
				<option value="" disabled selected>Select a plan...</option>
				<option value="free">Free</option>
				<option value="pro">Pro</option>
			</select>
		</label>

		<label class="v-stack">
			<span>Bio</span>
			<textarea placeholder="Add a bio..." value="{ bio }" rows="3"></textarea>
		</label>

		<label class="h-stack items-center">
			<input type="checkbox" checked="{ agree }" />
			<span>Agree to terms</span>
		</label>
	</form>

	<div class="info">
		<div>Email: <code>{ email || 'empty' }</code></div>
		<div>Agreed: <code>{ agree || 'false' }</code></div>
		<div>Plan: <code>{ plan || 'empty' }</code></div>
		<div>Bio: <code>{ bio || 'empty' }</code></div>
		<div>Is valid: <code>{ isComplete() }</code></div>
	</div>
</base-layout>

<style>
	.info {
		position: absolute;
		text-align: start;
		font-size: smaller;
	}

	.is-valid {
		outline: 2px solid lightgreen;
		outline-offset: 2rem;
		corner-shape: squircle;
		border-radius: var(--radius-md);
	}
</style>
