<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let formModel = {
		email: 'em@il.me',
		agree: false,
		plan: '',
		bio: '',
	}

	const emailIsValid = email => {
		return email.length > 0 && email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)
	}

	const planIsValid = plan => {
		return plan.length > 0 && ['free', 'pro'].includes(plan)
	}

	const isComplete = () => {
		return (
			emailIsValid(formModel.email) &&
			planIsValid(formModel.plan) &&
			formModel.bio.length > 0 &&
			formModel.agree
		)
	}
</script>

<base-layout title="Form model">
	<article class="prose prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<h1>Form model</h1>
			<p>A reactive form model with validation and submission.</p>
		</header>

		<form class="grid gap-4 w-full max-w-sm not-prose" class:is-valid="{ isComplete() }">
			<div class="grid gap-2">
				<label for="email" class="flex justify-between">
					Email
					<span class="text-xs font-mono text-gray-400">{ formModel.email || 'empty' }</span>
				</label>
				<input
					id="email"
					type="email"
					placeholder="Enter your email..."
					value="{ formModel.email }"
					autocapitalize="off"
					autocorrect="off"
					autofocus
					autocomplete="email"
					required />
			</div>

			<div class="grid gap-2">
				<label for="plan-select" class="flex justify-between">
					Plan
					<span class="text-xs font-mono text-gray-400">{ formModel.plan || 'empty' }</span>
				</label>
				<select id="plan-select" value="{ formModel.plan }" required>
					<option value="" disabled selected>Select a plan...</option>
					<option value="free">Free</option>
					<option value="pro">Pro</option>
				</select>
			</div>

			<div class="grid gap-2">
				<fieldset id="plan-options" class="grid gap-2">
					<legend class="flex justify-between w-full">Radio group</legend>
					<label>
						<input
							type="radio"
							name="plan-radio"
							value="free"
							checked="{ formModel.plan }"
							required />
						<span>Free</span>
					</label>
					<label>
						<input
							type="radio"
							name="plan-radio"
							value="pro"
							checked="{ formModel.plan }"
							required />
						<span>Pro</span>
					</label>
				</fieldset>
			</div>

			<div class="grid gap-2">
				<label for="bio" class="flex justify-between">
					Bio
					<span class="text-xs font-mono text-gray-400">{ formModel.bio || 'empty' }</span>
				</label>
				<textarea
					id="bio"
					placeholder="Add a bio..."
					value="{ formModel.bio }"
					rows="3"
					required></textarea>
			</div>

			<label>
				<input type="checkbox" checked="{ formModel.agree }" required />
				<span>Agree to terms</span>
			</label>

			<button type="submit" disabled="{ !isComplete() }">Submit</button>
		</form>
	</article>
</base-layout>

<style>
	.is-valid {
		box-shadow: 0 0 0 5px --opacity(var(--color-green-500), 0.2);
	}
</style>
