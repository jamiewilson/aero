<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/demos/header.html'
</script>

<script is:state>
	let formModel = {
		email: '',
		agree: false,
		plan: '',
		bio: '',
	}

	const emailIsValid = email => {
		return email.length > 0 && email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)
	}

	const planIsValid = plan => {
		return plan.length > 0 && ['free', 'pro'].includes(plan)
	}

	const isComplete = () => {
		return (
			emailIsValid(formModel.email) &&
			planIsValid(formModel.plan) &&
			formModel.bio.length > 0 &&
			formModel.agree
		)
	}
</script>

<base-layout title="Form model">
	<section class="grid">
		<header-component
			title="Form model"
			subtitle="A reactive form model with validation and submission." />
		<form class="grid gap-4 w-full max-w-sm mb-[20vh]">
			<div class="grid gap-2">
				<label for="email" class="flex justify-between"
					>Email
					<span class="text-xs font-mono text-gray-400">{ formModel.email || 'empty' }</span></label
				>
				<input
					id="email"
					type="email"
					placeholder="Enter your email..."
					value="{ formModel.email }"
					required />
			</div>

			<div class="grid gap-2">
				<label for="plan-select" class="flex justify-between"
					>Plan
					<span class="text-xs font-mono text-gray-400">{ formModel.plan || 'empty' }</span></label
				>
				<select id="plan-select" value="{ formModel.plan }" required>
					<option value="" disabled selected>Select a plan...</option>
					<option value="free">Free</option>
					<option value="pro">Pro</option>
				</select>
			</div>

			<fieldset class="grid gap-1">
				<label class="flex justify-between"
					>Radio group
					<span class="text-xs font-mono text-gray-400">{ formModel.plan || 'empty' }</span></label
				>
				<label>
					<input
						type="radio"
						name="plan-radio"
						value="free"
						checked="{ formModel.plan }"
						required />
					<span>Free</span>
				</label>
				<label>
					<input type="radio" name="plan-radio" value="pro" checked="{ formModel.plan }" required />
					<span>Pro</span>
				</label>
			</fieldset>

			<div class="grid gap-2">
				<label for="bio" class="flex justify-between"
					>Bio
					<span class="text-xs font-mono text-gray-400">{ formModel.bio || 'empty' }</span></label
				>
				<textarea
					id="bio"
					placeholder="Add a bio..."
					value="{ formModel.bio }"
					rows="3"
					required></textarea>
			</div>

			<label>
				<input type="checkbox" checked="{ formModel.agree }" required />
				<span>Agree to terms</span>
			</label>

			<button type="submit" disabled="{ !isComplete() }" class:is-valid="{ isComplete() }">
				Submit
			</button>
		</form>
	</section>
</base-layout>

<style>
	.is-valid {
		outline: 2px solid var(--color-lime-500);
	}
</style>
