<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/header.html'
</script>

<script is:state>
	let count = 0
</script>

<base-layout title="Reactivity Demo" count="{ count }">
	<header-component bind:count="{ count }" />
	<div class="flex gap-2 items-center">
		<button on:click="{ count-- }">−</button>
		<h2 data-is-even="{ count % 2 === 0 }"><code>{ count }</code></h2>
		<button on:click="{ count++ }">+</button>
	</div>
</base-layout>

<style>
	[data-is-even] {
		color: var(--color-accent);
	}
</style>
