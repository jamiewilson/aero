<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/header.html'
</script>

<script is:state>
	let count = 0
</script>

<base-layout title="Reactivity Demo" count="{ count }">
	<header-component bind:count="{ count }" />
	<section class="h-stack justify-center items-center">
		<button on:click="{ count-- }">−</button>
		<h2 data-is-even="{ count % 2 === 0 }">{ count }</h2>
		<button on:click="{ count++ }">+</button>
	</section>
</base-layout>

<style>
	[data-is-even] {
		color: var(--color-accent);
	}
</style>
