<script is:build>
	import base from '@layouts/base'
</script>

<script is:state>
	let count = 0
</script>

<base-layout title="Reactivity: { count }">
	<section class="h-stack items-center">
		<button on:click="{ count-- }">−</button>
		<h2>{ count }</h2>
		<button on:click="{ count++ }">+</button>
	</section>
</base-layout>
