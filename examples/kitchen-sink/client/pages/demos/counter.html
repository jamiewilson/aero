<script is:build>
	import base from '@layouts/base'
	import header from '@components/header'
</script>

<script is:state>
	let count = 0
</script>

<base-layout title="Counter Demo" count="{ count }">
	<header-component title="Counter Demo" bind:count="{ count }" />
	<section class="h-stack justify-center items-center">
		<button on:click="{ count-- }">−</button>
		<h2>{ count }</h2>
		<button on:click="{ count++ }">+</button>
	</section>
</base-layout>
