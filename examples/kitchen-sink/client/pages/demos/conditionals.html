<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let count = 0
	let status = 'loading'

	const nextStatus: Record<string, string> = {
		loading: 'error',
		error: 'ready',
		ready: 'loading',
	}

	function cycleStatus() {
		status = nextStatus[status]
	}
</script>

<base-layout title="Reactive conditionals">
	<section>
		<p>Reactive <code>if</code> / <code>else-if</code> / <code>else</code></p>

		<div>
			<button on:click="{ count-- }">−</button>
			<code>count = { count }</code>
			<button on:click="{ count++ }">+</button>
		</div>

		<div>
			<p if="{ count > 0 }">Positive branch</p>
			<p else-if="{ count < 0 }">Negative branch</p>
			<p else>Zero branch</p>
		</div>

		<p>Reactive <code>switch</code> / <code>case</code> / <code>default</code></p>

		<div>
			<button on:click="{ cycleStatus() }">Cycle status</button>
			<code>status = { status }</code>
		</div>

		<div switch="{ status }">
			<p case="loading">Loading branch</p>
			<p case="error">Error branch</p>
			<p default>Ready branch</p>
		</div>
	</section>
</base-layout>
