<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let note = 'Runtime fragment reads page state via $refs.'
	let showNote = true
	let status = 'loading'
</script>

<base-layout title="Adopt runtime">
	<section class="v-stack">
		<p class="secondary"><code>AeroReactivity.adopt()</code> for inserted HTML</p>

		<label class="h-stack items-center">
			<input type="checkbox" checked="{ showNote }" />
			<span>Show inserted fragment</span>
		</label>

		<label class="v-stack">
			<span>Page signal (<code>note</code>)</span>
			<input value="{ note }" />
		</label>

		<label class="v-stack">
			<span>Page signal (<code>status</code>)</span>
			<select value="{ status }">
				<option value="loading">loading</option>
				<option value="error">error</option>
				<option value="ready">ready</option>
			</select>
		</label>

		<button type="button" id="adopt-insert">Insert fragment</button>
		<button type="button" id="adopt-insert-switch">Insert switch fragment</button>
		<div id="adopt-host" class="card secondary">Fragment mounts here…</div>
	</section>
</base-layout>

<script>
	import aero from '@aero-js/core'

	const insert = document.getElementById('adopt-insert')
	const host = document.getElementById('adopt-host')
	if (insert && host) {
		insert.addEventListener('click', () => {
			host.innerHTML = '<p data-aero-show="$showNote"><span data-aero-text="$note"></span></p>'
			aero.getReactivityRuntime?.()?.adopt(host)
		})
	}

	const insertSwitch = document.getElementById('adopt-insert-switch')
	if (insertSwitch && host) {
		insertSwitch.addEventListener('click', () => {
			host.innerHTML = `
				<div data-aero-switch="$status">
					<template data-aero-case="loading"><p>Runtime loading…</p></template>
					<template data-aero-case="error"><p>Runtime error</p></template>
					<template data-aero-default><p>Runtime ready</p></template>
				</div>
			`
			aero.getReactivityRuntime?.()?.adopt(host)
		})
	}
</script>
