<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let open = false
	let body = '<code>html="{ body }"</code> binding'
	let active = false
	let saving = false
</script>

<base-layout title="Binding handlers">
	<section>
		<p><code>show</code>, <code>html</code>, <code>class:*</code>, property bindings</p>

		<div>
			<button on:click="{ open = !open }">Toggle show</button>
			<div show="{ open }">Shown when <code>open</code> is true</div>
		</div>

		<div html="{ body }"></div>

		<button on:click="{ active = !active }" class:is-active="{ active }">
			Toggle <code>class:is-active</code>
		</button>

		<button disabled="{ saving }" on:click="{ saving = !saving }">
			Toggle disabled (property binding)
		</button>
	</section>
</base-layout>

<style>
	.is-active {
		outline: 2px solid var(--accent, #0b57d0);
	}
</style>
