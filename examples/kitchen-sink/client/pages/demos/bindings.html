<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let markup = '<strong>html="{ markup }"</strong> binding'
	let isOpen = false
	let isActive = false
	let isSaving = false
</script>

<base-layout title="Binding handlers">
	<article class="prose prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<h1>Binding handlers</h1>
			<p><code>show</code>, <code>html</code>, <code>class:*</code>, property bindings</p>
		</header>

		<section>
			<header>
				<h2>Show binding</h2>
			</header>
			<div class="grid gap-4 not-prose">
				<button on:click="{ isOpen = !isOpen }">Toggle <code>isOpen</code></button>
				<div show="{ isOpen }" class="card bg-green-500/10 text-center">
					Shown when <code>isOpen</code> is true
				</div>
			</div>
		</section>

		<section>
			<header>
				<h2>HTML binding</h2>
			</header>
			<div html="{ markup }" class="card text-center"></div>
		</section>

		<section>
			<header>
				<h2>Class binding</h2>
			</header>
			<div class="grid gap-4 not-prose">
				<button on:click="{ isActive = !isActive }">
					Toggle <code>isActive</code> class binding
				</button>
				<div class:is-active="{ isActive }" class="card text-center">
					<code>class="{ isActive ? 'is-active' : '' }"</code>
				</div>
			</div>
		</section>

		<section>
			<header>
				<h2>Property binding</h2>
			</header>
			<div class="grid gap-4 not-prose">
				<button on:click="{ isSaving = !isSaving }">Toggle disabled (property binding)</button>
				<button class="disabled:bg-red-700/20" disabled="{ isSaving }">
					disabled="{ isSaving }"
				</button>
			</div>
		</section>
	</article>
</base-layout>

<style>
	.is-active {
		background-color: --opacity(var(--color-green-500), 0.1);
	}
</style>
