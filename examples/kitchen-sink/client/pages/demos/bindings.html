<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/demos/header.html'
</script>

<script is:state>
	let open = false
	let body = '<strong>html="{ body }"</strong> binding'
	let active = false
	let saving = false
</script>

<base-layout title="Binding handlers">
	<article class="max-w-fit justify-self-center pb-[20vh]">
		<header-component
			title="Binding handlers"
			subtitle="<code>show</code>, <code>html</code>, <code>class:*</code>, property bindings" />

		<main class="grid gap-4">
			<div class="grid gap-4">
				<button on:click="{ open = !open }">Toggle show</button>
				<div show="{ open }" class="card bg-green-500/10 text-center">
					Shown when <code>open</code> is true
				</div>
			</div>

			<div html="{ body }" class="card text-center"></div>

			<button on:click="{ active = !active }">Toggle <code>active</code> class binding</button>
			<div class:is-active="{ active }" class="card text-center">
				<code>class="{ active ? 'is-active' : '' }"</code>
			</div>

			<button on:click="{ saving = !saving }">Toggle disabled (property binding)</button>
			<button disabled="{ saving }">disabled="{ saving }"</button>
		</main>
	</article>
</base-layout>

<style>
	.is-active {
		outline: 2px solid var(--accent, #0b57d0);
	}
</style>
