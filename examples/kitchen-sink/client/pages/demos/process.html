<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	let note = 'Runtime fragment reads page state via $refs, e.g. $note'
	let showNote = true
	let status = 'loading'
</script>

<base-layout title="Process runtime">
	<article class="prose prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<h1>Process runtime</h1>
			<p><code>runtime.process()</code> wires reactive bindings on HTML inserted after load.</p>
			<hr />
		</header>

		<main class="grid gap-4">
			<label class="grid gap-4">
				<span>State: <code>note</code></span>
				<input type="text" value="{ note }" />
			</label>

			<label class="grid gap-4">
				<span>State: <code>status</code></span>
				<select value="{ status }">
					<option value="loading">loading</option>
					<option value="error">error</option>
					<option value="ready">ready</option>
				</select>
			</label>

			<div class="flex gap-2 flex-wrap justify-between">
				<button type="button" id="process-note">Insert note fragment</button>
				<button type="button" on:click="{ showNote = !showNote }">Toggle via $showNote</button>
				<button type="button" id="process-status">Insert status fragment</button>
			</div>

			<div id="process-host" class="card text-sm bg-green-500/10 not-prose">
				Fragments mounts here…
			</div>
		</main>
	</article>
</base-layout>

<script>
	import aero from '@aero-js/core'

	const host = document.getElementById('process-host')
	const noteButton = document.getElementById('process-note')
	const statusButton = document.getElementById('process-status')

	if (noteButton && host) {
		noteButton.addEventListener('click', () => {
			host.innerHTML = `
				<p data-aero-show="$showNote" data-aero-text="$note"></p>
			`
			aero.getReactivityRuntime?.()?.process(host)
		})
	}

	if (statusButton && host) {
		statusButton.addEventListener('click', () => {
			host.innerHTML = `
				<div data-aero-switch="$status">
					<template data-aero-case="loading"><p>Runtime loading…</p></template>
					<template data-aero-case="error"><p>Runtime error</p></template>
					<template data-aero-default><p>Runtime ready</p></template>
				</div>
			`
			aero.getReactivityRuntime?.()?.process(host)
		})
	}
</script>
