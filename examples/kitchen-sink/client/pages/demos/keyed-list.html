<script is:build>
	import base from '@layouts/base'

	const initialItems = [
		{ id: crypto.randomUUID() },
		{ id: crypto.randomUUID() },
		{ id: crypto.randomUUID() },
	]
</script>

<script is:state>
	import { withTransition } from '@scripts/utils/withTransition'

	let items = initialItems

	function addItem() {
		const id = crypto.randomUUID()
		withTransition(() => (items = [...items, { id }]))
	}

	function removeFirst() {
		if (items.length === 0) return
		withTransition(() => (items = items.slice(1)))
	}

	function reverseItems() {
		withTransition(() => (items = [...items].reverse()))
	}
</script>

<base-layout title="Keyed list">
	<section class="v-stack">
		<p class="secondary">Keyed reactive <code>for</code> loop with <code>key</code></p>

		<div class="h-stack">
			<button on:click="{ addItem() }">Add</button>
			<button on:click="{ removeFirst() }">Remove first</button>
			<button on:click="{ reverseItems() }">Reverse</button>
		</div>
	</section>
	<ul>
		<li
			class="list-item"
			for="{ const item of items }"
			key="{ item.id }"
			text="{ item.id.slice(-8) }"></li>

		<style>
			@scope {
				:scope {
					list-style-type: decimal-leading-zero;
					list-style-position: inside;
					justify-self: center;
					text-align: start;
					font-family: var(--font-mono);
					font-size: smaller;

					li {
						view-transition-name: match-element;
						view-transition-class: list-item;
					}
				}
			}
		</style>
	</ul>
</base-layout>
