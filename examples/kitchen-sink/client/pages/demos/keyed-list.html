<script is:build>
	import base from '@layouts/base.html'
</script>

<base-layout title="Keyed list">
	<header>
		<h2>Keyed list</h2>
		<p class="secondary">
			Keyed reactive <code>for</code> loop with <code>key</code> and view transitions
		</p>
	</header>
	<article class="two-column">
		<div class="v-stack">
			<button on:click="{ add() }">Add</button>
			<button on:click="{ remove() }">Remove first</button>
			<button on:click="{ addRandom() }">Add random</button>
			<button on:click="{ removeRandom() }">Remove random</button>
			<button on:click="{ reverse() }">Reverse</button>
			<button on:click="{ shuffle() }">Shuffle</button>
		</div>

		<ul class="card scrollable">
			<li for="{ const { id } of items }" key="{ id }"><code>{ id }</code></li>
		</ul>
	</article>
</base-layout>

<script is:state>
	import { withTransition, createID, getRandomIndex } from '@scripts/utils'

	// Helpers
	const setItems = newItems => withTransition(() => (items = newItems))

	// State
	let items = Array.from({ length: 10 }, () => ({ id: createID() }))

	// Handlers
	const add = () => setItems([...items, { id: createID() }])
	const remove = () => (items.length === 0 ? null : setItems(items.slice(1)))
	const reverse = () => setItems([...items].reverse())
	const shuffle = () => setItems([...items].sort(() => Math.random() - 0.5))

	const addRandom = () => {
		const index = getRandomIndex(items)
		setItems([...items.slice(0, index), { id: createID() }, ...items.slice(index)])
	}

	const removeRandom = () => {
		const index = getRandomIndex(items)
		setItems([...items.slice(0, index), ...items.slice(index + 1)])
	}
</script>

<style>
	.two-column {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 2rem;
		max-height: 400px;
	}

	.scrollable {
		overflow-y: auto;
		overflow-x: hidden;
		view-transition-name: keyed-list;
		view-transition-group: contain;
		scrollbar-width: none;
	}

	::view-transition-group-children(keyed-list) {
		overflow: clip;
	}

	ul {
		list-style-type: decimal-leading-zero;
		list-style-position: inside;
		font-family: var(--font-mono);
		font-size: smaller;

		li {
			view-transition-name: match-element;
			view-transition-class: list-item;
			user-select: none;
		}
	}

	::view-transition-new(.list-item),
	::view-transition-old(.list-item) {
		animation-duration: var(--duration-fast);
		animation-timing-function: var(--ease-in-out-cubic);
	}

	::view-transition-new(.list-item):only-child {
		animation-name: slide-in-from-right;
	}

	::view-transition-old(.list-item):only-child {
		animation-name: slide-out-to-left;
	}
</style>
