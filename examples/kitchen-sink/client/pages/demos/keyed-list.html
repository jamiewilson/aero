<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/demos/header.html'
</script>

<script is:state>
	import { createID, getRandomIndex } from '@scripts/utils'

	const setItems = next =>
		document.startViewTransition({
			update: () => (items = next),
			types: ['list-update'],
		})

	let items = Array.from({ length: 5 }, () => ({ id: createID() }))
	let hasItems = items.length > 0

	const add = () => setItems([...items, { id: createID() }])
	const remove = () => hasItems && setItems(items.slice(1))
	const reverse = () => setItems([...items].reverse())
	const shuffle = () => setItems([...items].sort(() => Math.random() - 0.5))

	const addRandom = () => {
		const index = getRandomIndex(items)
		setItems([...items.slice(0, index), { id: createID() }, ...items.slice(index)])
	}

	const removeRandom = () => {
		const index = getRandomIndex(items)
		setItems([...items.slice(0, index), ...items.slice(index + 1)])
	}
</script>

<base-layout title="Keyed list">
	<article class="max-w-fit justify-self-center pb-[20vh]">
		<header-component
			title="Keyed reactive list"
			subtitle="Keyed reactive <code>for</code> loop with <code>key</code> and view transitions" />

		<section class="grid grid-cols-2 gap-4 h-full">
			<div class="flex flex-col gap-2">
				<button on:click="{ add() }">Add</button>
				<button on:click="{ addRandom() }">Add random</button>
				<button on:click="{ remove() }" disabled="{ !hasItems }">Remove first</button>
				<button on:click="{ removeRandom() }" disabled="{ !hasItems }">Remove random</button>
				<button on:click="{ reverse() }" disabled="{ !hasItems }">Reverse</button>
				<button on:click="{ shuffle() }" disabled="{ !hasItems }">Shuffle</button>
			</div>

			<div class="scroll-wrap">
				<ul class="card scroll-content keyed-list">
					<li class="transition-item" for="{ const { id } of items }" key="{ id }">
						<code>{ id }</code>
					</li>
				</ul>
			</div>
		</section>
	</article>
</base-layout>

<style>
	@import 'tailwindcss/utilities';
	@reference '@styles/global.css';

	@utility keyed-list {
		@apply list-inside font-mono text-sm space-y-2;
		list-style-type: decimal-leading-zero;
	}

	html:active-view-transition-type(list-update) {
		view-transition-name: none;
	}

	.scroll-wrap {
		height: 0;
		min-height: 100%;
	}

	.scroll-content {
		height: 100%;
		overflow-y: auto;
		overflow-x: hidden;
		view-transition-name: keyed-list;
		view-transition-group: contain;
	}

	::view-transition-group-children(keyed-list) {
		overflow: clip;
	}

	.transition-item {
		view-transition-name: match-element;
		view-transition-class: list-item;
		animation-timing-function: var(--ease-in-out-quadratic);
		user-select: none;
	}

	::view-transition-new(.list-item):only-child {
		animation-name: slide-in;
	}

	::view-transition-old(.list-item):only-child {
		animation-name: slide-out;
	}
</style>
