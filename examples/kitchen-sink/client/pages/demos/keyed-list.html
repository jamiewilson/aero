<script is:build>
	import base from '@layouts/base.html'
</script>

<script is:state>
	import { withTransition } from '@scripts/utils/withTransition.ts'

	const createID = () => crypto.randomUUID().split('-').pop()
	let items = [{ id: createID() }, { id: createID() }, { id: createID() }]

	function add() {
		const id = createID()
		withTransition(() => (items = [...items, { id }]))
	}

	function remove() {
		if (items.length === 0) return
		withTransition(() => (items = items.slice(1)))
	}

	function addRandom() {
		const id = createID()
		const index = Math.floor(Math.random() * items.length)
		withTransition(() => (items = [...items.slice(0, index), { id }, ...items.slice(index)]))
	}

	function removeRandom() {
		const index = Math.floor(Math.random() * items.length)
		withTransition(() => (items = [...items.slice(0, index), ...items.slice(index + 1)]))
	}

	function reverse() {
		withTransition(() => (items = [...items].reverse()))
	}

	function shuffle() {
		withTransition(() => (items = [...items].sort(() => Math.random() - 0.5)))
	}
</script>

<base-layout title="Keyed list">
	<header>
		<h2>Keyed list</h2>
		<p class="secondary">
			Keyed reactive <code>for</code> loop with <code>key</code> and view transitions
		</p>
	</header>
	<article class="two-column">
		<div class="v-stack">
			<button on:click="{ add() }">Add</button>
			<button on:click="{ remove() }">Remove first</button>
			<button on:click="{ addRandom() }">Add random</button>
			<button on:click="{ removeRandom() }">Remove random</button>
			<button on:click="{ reverse() }">Reverse</button>
			<button on:click="{ shuffle() }">Shuffle</button>
		</div>
		<ul class="card">
			<li class="list-item" for="{ const { id } of items }" key="{ id }">{ id }</li>

			<style>
				@scope {
					:scope {
						list-style-type: decimal-leading-zero;
						list-style-position: inside;
						font-family: var(--font-mono);
						font-size: smaller;

						li {
							view-transition-name: match-element;
							view-transition-class: list-item;
							user-select: none;
						}
					}
				}

				::view-transition-new(.list-item),
				::view-transition-old(.list-item) {
					animation-duration: var(--duration-fast);
					animation-timing-function: var(--ease-in-out-cubic);
				}

				::view-transition-new(.list-item):only-child {
					animation-name: slide-in-from-right;
				}

				::view-transition-old(.list-item):only-child {
					animation-name: slide-out-to-left;
				}
			</style>
		</ul>
	</article>
</base-layout>

<style>
	.two-column {
		display: grid;
		grid-template-columns: 1fr 1fr;
		gap: 2rem;
	}
</style>
