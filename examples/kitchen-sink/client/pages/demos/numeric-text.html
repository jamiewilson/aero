<script is:build>
	import base from '@layouts/base.html'
	import numericText from '@components/numeric-text.html'
</script>

<script is:state>
	let count = 1234
	let animated = true
	let trend = 0
	let count2 = 4321
</script>

<base-layout title="Numeric text">
	<section class="v-stack">
		<numeric-text-component bind:value="{ count }" animated="{ animated }" trend="{ trend }" />
		<numeric-text-component bind:value="{ count2 }" />
		<button on:click="{ count++ }">Increment</button>
		<button on:click="{ count-- }">Decrement</button>
		<button on:click="{ count2 = Math.floor(Math.random() * 10000) }">Random number</button>
		<button on:click="{ ((count = 0), (count2 = 0)) }">Reset</button>
	</section>
</base-layout>
