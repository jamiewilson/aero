<script is:build>
	import base from '@layouts/base.html'
	import header from '@components/demos/header.html'
	import numericText from '@components/numeric-text.html'
</script>

<script is:state>
	let count = 1234
	let animated = true
	let trend = 0
</script>

<base-layout title="Numeric text">
	<article class="prose prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<h1>Numeric text</h1>
			<p>
				<code>{`<numeric-text />`}</code> wrapper component with bindable <code>value</code> prop.
			</p>
		</header>

		<main class="grid grid-cols-2 gap-4 not-prose">
			<section class="grid gap-2">
				<button on:click="{ count = Math.floor(Math.random() * 10000) }">Random number</button>
				<button on:click="{ count++ }">Increment</button>
				<button on:click="{ count-- }">Decrement</button>
				<button on:click="{ count = 0 }">Reset</button>
			</section>

			<figure class="card grid place-items-center">
				<!-- FIXME: class bindings don't work here when using a component -->
				<numeric-text-component
					bind:value="{ count }"
					animated="{ animated }"
					trend="{ trend }"
					class:is-animated="{ animated }"
					classes="font-bold text-[4rem]" />
			</figure>
		</main>
	</article>
</base-layout>
