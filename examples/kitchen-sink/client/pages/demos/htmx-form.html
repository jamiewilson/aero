<script is:build>
	import base from '@layouts/base.html'

	const dismiss = el => setTimeout(() => el.replaceChildren(), 3000)
</script>

<base-layout title="HTMX/Alpine form">
	<article class="prose prose-dark:prose-invert place-self-center pb-[20vh]">
		<header>
			<h1>HTMX/Alpine form</h1>
			<p>Alpine <code>x-model</code> with an HTMX POST and toast fragment.</p>
		</header>

		<main x-data="{ input: '', dismiss: ${dismiss} }" class="grid gap-4 text-center">
			<p>Test the server:</p>
			<form
				class="grid gap-2 w-full"
				data-testid="htmx-form"
				hx-post="/api/submit"
				hx-on::after-request="if (event.detail.successful) this.reset()"
				hx-target="[hx-toast]"
				hx-swap="innerHTML">
				<input
					x-model="input"
					data-testid="htmx-form-message-input"
					type="text"
					name="message"
					placeholder="Enter a message" />
				<button type="submit" :disabled="!input.length">Send POST Request</button>
			</form>

			<span data-testid="htmx-form-toast" hx-toast @htmx:after-swap="dismiss($el)"></span>
		</main>
	</article>
</base-layout>
