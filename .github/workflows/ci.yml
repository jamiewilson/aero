name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # pnpm store cache (see setup-vp below). We do not persist node_modules/.vite/task-cache here:
      # Vite+ task cache replays stdout only; restoring it could skip real vp check/vp test/vp run work and does not restore dist/ (vite-plus cache guide).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Check (format + lint)
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp test

      - name: Build packages
        run: pnpm exec vp run build:packages
