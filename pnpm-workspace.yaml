# Hoist transitive oxfmt (from vite-plus) so `.oxfmtrc.json` $schema resolves to `./node_modules/oxfmt/...`.
publicHoistPattern:
  - '*oxfmt*'

packages:
  - 'packages/*'
  - 'packages/templates/*'
  - 'packages/create/dist/*'
  - 'examples/*'
  - 'examples/import-bundling/*'
  - 'examples/integrations/*'
  - 'website'
