<script is:build>
	import site from '@content/site'
</script>

<aside>
	<div class="sticky">
		<a class="title" href="#top">Table of Contents</a>
		<ul class="toc">
			<li each="{ item in site.toc }">
				<a class="link" href="{ item.href }" data-toc-link>{ item.label }</a>
			</li>
		</ul>
	</div>

	<style>
		@scope {
			:scope {
				font-size: smaller;
				min-width: max-content;

				@media (width < 768px) {
					display: none;
				}
			}

			.sticky {
				top: var(--page-padding);
				margin-top: var(--page-block-start);
				position: sticky;
				overflow-y: auto;
				max-height: 100vh;
				padding-bottom: 25vh;
			}

			.toc {
				list-style: none;
				display: grid;
				gap: 0.5rem;
			}

			.title {
				color: initial;
				display: inline-block;
				margin-block-end: 1rem;
			}

			.link {
				transition: padding 0.2s;
			}

			.current {
				display: inline-block;
				border-left: 2px solid white;
				padding-left: 0.5rem;
			}
		}
	</style>
</aside>

<script>
	const currentClass = 'current'
	const linkSelector = '[data-toc-link]'

	const linksById = new Map(
		[...document.querySelectorAll(linkSelector)]
			.map(link => [link.hash.slice(1), link])
			.filter(([id]) => id)
	)

	const headings = [...linksById.keys()].map(id => document.getElementById(id)).filter(Boolean)
	let currentLink = null

	const setCurrent = id => {
		if (!id) {
			currentLink?.classList.remove(currentClass)
			currentLink = null
			return
		}

		const nextLink = linksById.get(id)
		if (!nextLink || nextLink === currentLink) return
		currentLink?.classList.remove(currentClass)
		nextLink.classList.add(currentClass)
		currentLink = nextLink
	}

	const getActiveHeadingId = () => {
		if (!headings.length) return ''

		const scrollY = window.scrollY + window.innerHeight * 0.5
		let activeId = ''

		for (const heading of headings) {
			if (!heading.id) continue
			if (heading.offsetTop <= scrollY) {
				activeId = heading.id
			} else {
				break
			}
		}

		return activeId
	}

	let isTicking = false
	const updateCurrent = () => {
		isTicking = false
		setCurrent(getActiveHeadingId())
	}

	const scheduleUpdate = () => {
		if (isTicking) return
		isTicking = true
		requestAnimationFrame(updateCurrent)
	}

	window.addEventListener('scroll', scheduleUpdate, { passive: true })
	window.addEventListener('resize', scheduleUpdate)
	window.addEventListener('hashchange', scheduleUpdate)

	scheduleUpdate()
</script>
