<script is:build>
	import base from '@layouts/base.html'

	const { status, message } = Aero.error
</script>

<base-layout title="{ status } | Error">
	<main class="grid gap-4">
		<h1 if="{ status === 404 }">Page not found</h1>
		<h1 else>Something went wrong</h1>

		<p if="{ status === 404 && Aero.page.url.pathname }">
			<code>{ Aero.page.url.pathname }</code> does not exist.
		</p>
		<p if="{ status === 404 && !Aero.page.url.pathname }">
			The page you are looking for does not exist.
		</p>
		<p else>{ message }</p>

		<a href="/">Back home</a>
	</main>
</base-layout>
